version: 2

project_name: foundry-tools

before:
  hooks:
    - go mod tidy

builds:
  - id: anvil
    main: ./cmd/anvil
    binary: anvil
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/cafecito-games/foundry-tools/internal/version.Version={{ .Version }}

  - id: protoc-gen-foundryscript
    main: ./cmd/protoc-gen-foundryscript
    binary: protoc-gen-foundryscript
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: foundry-tools
    ids:
      - anvil
      - protoc-gen-foundryscript
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: foundry-tools
    binaries:
      - anvil
      - protoc-gen-foundryscript
    repository:
      owner: cafecito-games
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/cafecito-games/foundry-tools"
    description: "Foundry Engine development tools"
    # The release binaries are not code-signed, so strip the quarantine
    # attribute on install to avoid Gatekeeper blocking the executables.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/anvil"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/protoc-gen-foundryscript"]
          end
