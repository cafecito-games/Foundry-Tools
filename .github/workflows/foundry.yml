name: Foundry Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq unzip protobuf-compiler

      - uses: bufbuild/buf-action@v1.4
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tools
        run: task build

      - name: Install Foundry
        run: scripts/ci/install-foundry.sh
        env:
          GH_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          FOUNDRY_RELEASE_TAG: v0.1.0
          FOUNDRY_ASSET_PATTERN: linux.x86_64.zip

      - name: Run Foundry tests
        run: task foundry:test
